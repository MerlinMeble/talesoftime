{% extends "base.html" %}
{% block title %}New Quest{% endblock %}

{% block content %}
<div class="page-header">
    <div><h1>📜 New Quest</h1></div>
    <a href="{{ url_for('main.quest_list') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="QuestName">Quest Name</label>
            <input type="text" id="QuestName" name="QuestName" class="form-control" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="RegionID">Region</label>
                <select id="RegionID" name="RegionID" class="form-control" required>
                    {% for r in form_vm.regions %}
                    <option value="{{ r.RegionID }}">{{ r.RegionName }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="DifficultyID">Difficulty</label>
                <select id="DifficultyID" name="DifficultyID" class="form-control" required>
                    {% for d in form_vm.difficulties %}
                    <option value="{{ d.DifficultyID }}">{{ d.DifficultyName }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Quest</button>
            <a href="{{ url_for('main.quest_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
